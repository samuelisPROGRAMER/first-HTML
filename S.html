<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Mano puslapis</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color: white;
    color: black;
    transition: 0.3s;
  }

  .dark-mode {
    background-color: #121212;
  }

  /* Dinamiškai keičiami elementai */
  .dynamic-text {
    color: black; /* pradinė spalva */
    transition: color 0.3s;
  }

  .dark-mode .dynamic-text {
    color: white; /* tamsiame režime balta */
  }

  /* Link to Youtube stilius – pabrauktas */
  a.dynamic-link {
    text-decoration: underline;
    font-weight: normal;
  }

  /* VEIKIAMASIS MYGTUKAS I TAMO stilius kaip mygtukas */
  a.dynamic-button {
    display: inline-block;
    padding: 10px 15px;
    border-radius: 8px;
    background-color: #4CAF50;
    color: black; /* pradžioje juoda */
    text-decoration: none;
    font-weight: bold;
    transition: all 0.3s;
  }

  /* Prisitaikymas prie tamsaus režimo */
  .dark-mode a.dynamic-button {
    color: white;
    background-color: #388E3C; /* tamsesnė žalia tamsiame režime */
  }

  /* Mygtuko hover efektas */
  a.dynamic-button:hover {
    background-color: #F44336; /* raudona užvedus */
    transform: translateY(-3px);
  }

  a.dynamic-button:active {
    transform: translateY(0);
  }

  /* Mygtukas tamsiam režimui */
  button {
    padding: 10px 15px;
    margin: 10px 0;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    font-size: 16px;
  }

</style>
</head>

<body>

<!-- Link to Youtube -->
<a href="https://www.youtube.com/" class="dynamic-text dynamic-link" target="_blank">Link to Youtube</a>
<p></p>

</html>
